name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: cargo check
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: cargo test
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: cargo clippy
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

  build:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build release binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: airpods-daemon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/airpods-daemon

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: airpods-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/airpods-cli

  windows-check:
    name: Windows Check & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            windows\target
          key: windows-cargo-${{ hashFiles('windows/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: cargo check (windows crate)
        working-directory: windows
        run: cargo check

      - name: cargo test (windows crate)
        working-directory: windows
        run: cargo test

      - name: cargo clippy (windows crate)
        working-directory: windows
        run: cargo clippy -- -D warnings

  windows-build:
    name: Build Windows release
    runs-on: windows-latest
    needs: windows-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            windows\target
          key: windows-cargo-${{ hashFiles('windows/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build release
        working-directory: windows
        run: cargo build --release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: airpods-windows-x86_64
          path: windows/target/release/airpods-windows.exe
